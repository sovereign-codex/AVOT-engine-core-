name: AVOT Core Receiver

on:
  repository_dispatch:
    types: [avot_execution]

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Log incoming dispatch
        run: |
          echo "=== AVOT CORE RECEIVED DISPATCH ==="
          echo "Trace ID: ${{ github.event.client_payload.trace_id }}"
          echo "Source: ${{ github.event.client_payload.source }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔑 REQUIRED for cross-repo dispatch + trace
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: sovereign-codex

      # 🔥 TRACE: received
      - name: Emit trace (received)
        run: |
          TRACE="${{ github.event.client_payload.trace_id || github.run_id }}"

          curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"receiver\",
                \"status\": \"received\"
              }
            }"

      - name: Ensure inputs directory
        run: |
          mkdir -p inputs/incoming

      - name: Write incoming payload
        id: write_payload
        run: |
          TRACE="${{ github.event.client_payload.trace_id }}"
          SOURCE="${{ github.event.client_payload.source }}"
          TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$TRACE" ]; then
            TRACE="${GITHUB_RUN_ID}"
          fi

          FILE="inputs/incoming/${TRACE}.json"

          echo '{' > $FILE
          echo '  "trace_id": "'$TRACE'",' >> $FILE
          echo '  "source": "'$SOURCE'",' >> $FILE
          echo '  "received_at": "'$TIME'",' >> $FILE
          echo '  "status": "received"' >> $FILE
          echo '}' >> $FILE

          echo "Wrote $FILE"

      - name: Commit incoming payload
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add inputs/incoming/
          git commit -m "Received dispatch ${{ github.event.client_payload.trace_id }}" || echo "No changes"
          git push

      # 🔥 TRACE: stored
      - name: Emit trace (stored)
        run: |
          TRACE="${{ github.event.client_payload.trace_id || github.run_id }}"

          curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"receiver\",
                \"status\": \"stored\"
              }
            }"

      # ⚙️ EXECUTION
      - name: Simulate AVOT execution
        id: execute
        run: |
          echo "Running AVOT logic..."
          sleep 2
          echo "Execution complete"

      # 🔥 TRACE: execution complete
      - name: Emit trace (engine complete)
        run: |
          TRACE="${{ github.event.client_payload.trace_id || github.run_id }}"

          curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"receiver\",
                \"status\": \"engine_completed\"
              }
            }"

      # 🔁 SEND RESULT BACK
      - name: Send result back to Control Center
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TRACE="${{ github.event.client_payload.trace_id }}"

          if [ -z "$TRACE" ]; then
            TRACE="${GITHUB_RUN_ID}"
          fi

          echo "Dispatching result for $TRACE"

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
            -d "{
              \"event_type\": \"avot_result\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"status\": \"completed\",
                \"source\": \"avot-core\"
              }
            }")

          echo "HTTP Status: $RESPONSE"
          cat response.txt

          if [ "$RESPONSE" = "204" ]; then
            echo "✅ Result dispatched"
            STATUS="result_sent"
          else
            echo "❌ Result dispatch failed"
            STATUS="result_failed"
          fi

          # 🔥 TRACE: result dispatch status
          curl -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"repo\": \"${{ github.repository }}\",
                \"workflow\": \"receiver\",
                \"status\": \"$STATUS\"
              }
            }"