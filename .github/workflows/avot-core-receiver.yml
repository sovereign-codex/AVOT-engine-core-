name: AVOT Core Receiver

on:
  repository_dispatch:
    types: [avot_execution]

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Log incoming dispatch
        run: |
          echo "=== AVOT CORE RECEIVED DISPATCH ==="
          echo "Trace ID: ${{ github.event.client_payload.trace_id }}"
          echo "Source: ${{ github.event.client_payload.source }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure inputs directory
        run: |
          mkdir -p inputs/incoming

      - name: Write incoming payload
        id: write_payload
        run: |
          TRACE="${{ github.event.client_payload.trace_id }}"
          SOURCE="${{ github.event.client_payload.source }}"
          TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          FILE="inputs/incoming/${TRACE}.json"

          echo '{' > $FILE
          echo '  "trace_id": "'$TRACE'",' >> $FILE
          echo '  "source": "'$SOURCE'",' >> $FILE
          echo '  "received_at": "'$TIME'",' >> $FILE
          echo '  "status": "received"' >> $FILE
          echo '}' >> $FILE

          echo "Wrote $FILE"

      - name: Commit incoming payload
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add inputs/incoming/
          git commit -m "Received dispatch ${{ github.event.client_payload.trace_id }}" || echo "No changes"
          git push

      # 🔥 NEW — SIMULATED EXECUTION STEP
      - name: Simulate AVOT execution
        id: execute
        run: |
          echo "Running AVOT logic..."
          sleep 2
          echo "Execution complete"

      # 🔥 NEW — SEND RESULT BACK TO CONTROL CENTER
      - name: Send result back to Control Center
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACE="${{ github.event.client_payload.trace_id }}"

          echo "Dispatching result for $TRACE"

          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sovereign-codex/control-center/dispatches \
            -d "{
              \"event_type\": \"avot_result\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE\",
                \"status\": \"completed\",
                \"source\": \"avot-core\"
              }
            }"

          echo "Result dispatched"