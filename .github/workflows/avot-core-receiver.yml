name: AVOT Core Receiver

on:
  repository_dispatch:
    types: [avot_execution]

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Log incoming dispatch
        run: |
          echo "=== AVOT CORE RECEIVED DISPATCH ==="
          echo "Trace ID: ${{ github.event.client_payload.trace_id }}"
          echo "Source: ${{ github.event.client_payload.source }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure inputs directory
        run: |
          mkdir -p inputs/incoming

      - name: Write incoming payload
        run: |
          FILE="inputs/incoming/dispatch_${{ github.run_id }}.json"

          echo '{' > $FILE
          echo '  "trace_id": "${{ github.event.client_payload.trace_id }}",' >> $FILE
          echo '  "source": "${{ github.event.client_payload.source }}",' >> $FILE
          echo '  "received_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"' >> $FILE
          echo '}' >> $FILE

          echo "Wrote $FILE"

      - name: Commit incoming payload
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add inputs/incoming/
          git commit -m "Received dispatch event" || echo "No changes"
          git push