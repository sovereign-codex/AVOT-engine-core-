name: AVOT Core Receiver

on:
  repository_dispatch:
    types:
      - avot_execution

permissions:
  contents: write

jobs:
  receive:
    runs-on: ubuntu-latest

    steps:
      - name: Log incoming dispatch
        run: |
          echo "=== AVOT CORE RECEIVED DISPATCH ==="
          echo "Trace ID: ${{ github.event.client_payload.trace_id }}"
          echo "Source: ${{ github.event.client_payload.source }}"
          echo "Route: ${{ github.event.client_payload.route }}"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: sovereign-codex

      - name: Set runtime variables
        run: |
          TRACE="${{ github.event.client_payload.trace_id }}"
          SOURCE="${{ github.event.client_payload.source }}"
          ROUTE="${{ github.event.client_payload.route }}"

          if [ -z "$TRACE" ]; then
            TRACE="trace_${GITHUB_RUN_ID}"
          fi

          if [ -z "$SOURCE" ]; then
            SOURCE="unknown"
          fi

          if [ -z "$ROUTE" ]; then
            ROUTE="unknown"
          fi

          echo "TRACE_ID=$TRACE" >> "$GITHUB_ENV"
          echo "SOURCE_REPO=$SOURCE" >> "$GITHUB_ENV"
          echo "ROUTE_NAME=$ROUTE" >> "$GITHUB_ENV"
          echo "TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      - name: Emit trace (received)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE_ID\",
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"AVOT Core Receiver\",
                \"status\": \"received\"
              }
            }"

      - name: Ensure inputs directory
        run: |
          mkdir -p inputs/incoming
          mkdir -p outputs/results

      - name: Write incoming payload
        run: |
          FILE="inputs/incoming/${TRACE_ID}.json"

          echo '{' > "$FILE"
          echo '  "trace_id": "'"$TRACE_ID"'",' >> "$FILE"
          echo '  "source": "'"$SOURCE_REPO"'",' >> "$FILE"
          echo '  "route": "'"$ROUTE_NAME"'",' >> "$FILE"
          echo '  "received_at": "'"$TIMESTAMP"'",' >> "$FILE"
          echo '  "status": "received"' >> "$FILE"
          echo '}' >> "$FILE"

          echo "Wrote $FILE"

      - name: Commit incoming payload
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add inputs/incoming/
          git commit -m "Received dispatch ${TRACE_ID}" || echo "No changes"
          git push

      - name: Emit trace (stored)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE_ID\",
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"AVOT Core Receiver\",
                \"status\": \"stored\"
              }
            }"

      - name: Simulate AVOT execution
        run: |
          echo "Running AVOT logic for $TRACE_ID"
          sleep 2
          RESULT_FILE="outputs/results/${TRACE_ID}.json"

          echo '{' > "$RESULT_FILE"
          echo '  "trace_id": "'"$TRACE_ID"'",' >> "$RESULT_FILE"
          echo '  "repo": "'"${GITHUB_REPOSITORY}"'",' >> "$RESULT_FILE"
          echo '  "status": "completed",' >> "$RESULT_FILE"
          echo '  "completed_at": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"' >> "$RESULT_FILE"
          echo '}' >> "$RESULT_FILE"

          echo "Execution complete"
          echo "Wrote $RESULT_FILE"

      - name: Commit execution result
        run: |
          git config user.name "codex-bot"
          git config user.email "actions@github.com"

          git add outputs/results/
          git commit -m "Execution result ${TRACE_ID}" || echo "No changes"
          git push

      - name: Emit trace (engine complete)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE_ID\",
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"AVOT Core Receiver\",
                \"status\": \"engine_completed\"
              }
            }"

      - name: Send result back to Control Center
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Dispatching result for $TRACE_ID"

          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sovereign-codex/Codex-control-center/dispatches \
            -d "{
              \"event_type\": \"avot_result\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE_ID\",
                \"status\": \"completed\",
                \"source\": \"AVOT-engine-core-\"
              }
            }")

          echo "HTTP Status: $RESPONSE"
          cat response.txt || true

          if [ "$RESPONSE" = "204" ]; then
            echo "Result dispatched"
            RESULT_STATUS="result_sent"
          else
            echo "Result dispatch failed"
            RESULT_STATUS="result_failed"
          fi

          echo "RESULT_STATUS=$RESULT_STATUS" >> "$GITHUB_ENV"

      - name: Emit trace (result dispatch status)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -s -X POST https://api.github.com/repos/sovereign-codex/AVOT-TRACE/dispatches \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"event_type\": \"trace_log\",
              \"client_payload\": {
                \"trace_id\": \"$TRACE_ID\",
                \"repo\": \"${GITHUB_REPOSITORY}\",
                \"workflow\": \"AVOT Core Receiver\",
                \"status\": \"$RESULT_STATUS\"
              }
            }"